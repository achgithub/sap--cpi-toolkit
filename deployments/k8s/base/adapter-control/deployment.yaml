apiVersion: apps/v1
kind: Deployment
metadata:
  name: adapter-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adapter-control
  template:
    metadata:
      labels:
        app: adapter-control
    spec:
      containers:
        - name: adapter-control
          image: ghcr.io/achgithub/cpi-toolkit-adapter-control:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: adapter-control-config
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: DB_URL
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: sftp-data
              mountPath: /sftp-data
      volumes:
        - name: sftp-data
          persistentVolumeClaim:
            claimName: sftp-data
