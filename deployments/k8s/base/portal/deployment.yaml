apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal
          image: sap-cpi-toolkit/portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: portal-config
          env:
            - name: IAS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ias
                  key: IAS_CLIENT_ID
            - name: IAS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ias
                  key: IAS_CLIENT_SECRET
            - name: IAS_TENANT_URL
              valueFrom:
                secretKeyRef:
                  name: ias
                  key: IAS_TENANT_URL
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
